# CD — runs on every push to main (i.e. when a PR is merged).
#
# Two jobs, run in sequence:
#
#   build-and-push   build the prod image and push it to the GitHub Container
#                    Registry (GHCR), tagged with the commit SHA and `latest`
#   deploy           depends on build-and-push; documents how the image would be
#                    rolled out to the Terraform-defined ECS Fargate service
#
# The deploy step is intentionally a DOCUMENTED dry-run: this assessment does not
# provision live AWS infrastructure (see infra/terraform — knowledge demo only),
# so the real `aws` commands are shown but not executed. Everything needed to make
# it live is present and commented (conceptually).

name: CD

# Fires when commits land on main — which, with the PR-based flow, means "on merge".
on:
  push:
    branches: [main]

# Don't cancel an in-flight deployment if another push arrives; let it finish.
concurrency:
  group: cd-main
  cancel-in-progress: false

env:
  # GHCR image name. github.repository is "<owner>/<repo>"; metadata-action
  # lowercases it (GHCR requires lowercase).
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Build the production image once and push it to GHCR with two tags:
  #   - the full commit SHA (immutable, traceable — what deploy references)
  #   - `latest` (convenience pointer to the newest main build)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest

    # Permissions this job's GITHUB_TOKEN needs:
    permissions:
      contents: read # check out the repo
      packages: write # push to GHCR

    # Expose the immutable commit-SHA tag to the deploy job. Deliberately NOT
    # steps.meta.outputs.version: that returns the highest-priority tag, which is
    # `latest` (raw outranks sha by default) — deploy must pin the exact SHA.
    # `sha-<sha>` matches the tag produced by `type=sha,format=long` below.
    outputs:
      image-tag: sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR using the token GitHub injects automatically — no manually
      # managed secret needed for the registry.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate tags + OCI labels from git metadata.
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      # Build the lean single-platform prod image and push it. Layer cache is
      # shared with CI via type=gha, so unchanged layers aren't rebuilt.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/prod/Dockerfile
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Same scope as CI's prod build — reuses those layers instead of rebuilding.
          cache-from: type=gha,scope=prod
          cache-to: type=gha,scope=prod,mode=max

      # --- PRODUCTION VARIANT: build once and push STRAIGHT to ECR --------------
      # In production the image lives in ECR (the Terraform-defined registry) so the
      # private task can pull it over VPC endpoints with no internet egress. The
      # correct shape is to build once and push directly to ECR — NOT push to GHCR
      # and copy it over afterwards. To switch, replace the three GHCR steps above
      # (Log in to GHCR / Derive image tags / Build and push) with the steps below
      # and add `id-token: write` to this job's `permissions` (needed for OIDC).
      #
      # permissions:
      #   contents: read
      #   id-token: write            # mint the OIDC token AWS exchanges for creds
      #
      # outputs:
      #   image-tag: ${{ github.sha }}   # plain SHA — matches the deploy ref below
      #
      # - name: Configure AWS credentials (OIDC — no stored keys)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      #     aws-region: ${{ secrets.AWS_REGION }}
      #
      # - name: Log in to Amazon ECR
      #   id: ecr
      #   uses: aws-actions/amazon-ecr-login@v2   # exposes steps.ecr.outputs.registry
      #
      # - name: Build and push to ECR
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     file: infra/docker/prod/Dockerfile
      #     platforms: linux/amd64
      #     provenance: false
      #     push: true
      #     # Tag with the plain commit SHA (+ latest) so the deploy job's
      #     # `$ECR_URL:${{ github.sha }}` reference matches exactly.
      #     tags: |
      #       ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
      #       ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
      #     cache-from: type=gha,scope=prod
      #     cache-to: type=gha,scope=prod,mode=max

  # ---------------------------------------------------------------------------
  # Deploy — DOCUMENTED dry-run. Shows exactly how the pushed image would roll out
  # to the ECS Fargate service defined in infra/terraform. The real AWS steps are
  # present but commented; the echo steps print the deployment plan so the run is
  # green and the flow is visible in the Actions log.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ECS (documented)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deployment plan
        env:
          IMAGE_REF: ${{ env.IMAGE }}:${{ needs.build-and-push.outputs.image-tag }}
        run: |
          echo "Image built and pushed (demo registry, GHCR): $IMAGE_REF"
          echo ""
          echo "How this would deploy to the Terraform-defined ECS Fargate service:"
          echo "  Build job: built the image once and pushed it STRAIGHT to ECR (the"
          echo "  Terraform-defined registry) so the private task can pull it over VPC"
          echo "  endpoints — no internet egress, no GHCR-then-copy step."
          echo ""
          echo "  1. Assume an AWS deploy role via OIDC (no long-lived keys)."
          echo "  2. Register a new ECS task definition revision pointing at the ECR image."
          echo "  3. Update the ECS service to the new revision and force a new deployment."
          echo "  4. Wait for the service to reach a steady state, then verify /health."
          echo ""
          echo "Registry/cluster/service names come from infra/terraform outputs"
          echo "(ecr_repository_url, ecs_cluster_name, ecs_service_name) — single source of truth."

      # --- The real deployment, commented out (no live infra in this assessment) ---
      #
      # The image is already in ECR (the build-and-push PRODUCTION VARIANT pushes it
      # there directly), so this job only assumes a role and rolls the new image out.
      #
      # - name: Configure AWS credentials (OIDC — no stored keys)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      #     aws-region: ${{ secrets.AWS_REGION }}
      #
      # - name: Register a new task definition revision and roll it out
      #   run: |
      #     CLUSTER="$(terraform -chdir=infra/terraform output -raw ecs_cluster_name)"
      #     SERVICE="$(terraform -chdir=infra/terraform output -raw ecs_service_name)"
      #     ECR_URL="$(terraform -chdir=infra/terraform output -raw ecr_repository_url)"
      #
      #     # Take the current task def, swap in the new image, register it as a new
      #     # revision, then point the service at that revision:
      #     TASK_DEF=$(aws ecs describe-task-definition --task-definition "$SERVICE" --query taskDefinition)
      #     NEW_DEF=$(echo "$TASK_DEF" | jq --arg IMG "$ECR_URL:${{ github.sha }}" \
      #       '.containerDefinitions[0].image = $IMG
      #        | {family,taskRoleArn,executionRoleArn,networkMode,containerDefinitions,requiresCompatibilities,cpu,memory}')
      #     NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_DEF" \
      #       --query taskDefinition.taskDefinitionArn --output text)
